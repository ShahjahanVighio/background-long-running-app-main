version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Purana step jo chal raha tha
        - env | grep -E "^(S3_BUCKET|SQS_QUEUE_URL|DYNAMODB_TABLE)=" >> .env.production
        
        # Naya step: Fake keys ko asli AWS keys bana kar fail mein inject karna
        - echo "AWS_ACCESS_KEY_ID=$MY_AWS_KEY" >> .env.production
        - echo "AWS_SECRET_ACCESS_KEY=$MY_AWS_SECRET" >> .env.production
        - echo "AWS_REGION=us-east-1" >> .env.production
        
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*